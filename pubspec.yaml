name: truck_account_book
description: "Mohsin Material Supplier - digital account book for truck material supply business."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0

  # Navigation
  go_router: ^14.1.4

  # Local auth / storage
  shared_preferences: ^2.2.3
  crypto: ^3.0.3

  # Forms & UI
  intl: ^0.19.0

  # Images
  image_picker: ^1.1.2

  # Export
  pdf: ^3.10.8
  printing: ^5.12.0
  excel: ^4.0.3

  # File handling
  file_picker: ^8.0.3
  share_plus: ^9.0.0

  # Utility
  collection: ^1.18.0
  uuid: ^4.4.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.16.0
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
